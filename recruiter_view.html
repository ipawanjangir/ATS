<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard - MSME Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">ATS <span>Portal</span></div>
        <button class="logout-btn" onclick="location.href='index.html'">Back</button>
    </nav>

    <div class="container my-4">
        <header class="text-center mb-5">
            <h2>Recruiter Panel</h2>
            <p class="text-muted">Source Candidates & Update Information</p>
        </header>

        <div class="dashboard-section glass-card p-3">
            <h3 class="h5 mb-3" style="color: #007bff;">🔥 Current Job Requirements</h3>
            <div class="table-responsive-sm">
                <table class="modern-table w-100">
                    <thead>
                        <tr>
                            <th>Role</th>
                            <th>Openings</th>
                            <th>Location</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody">
                        <tr>
                            <td colspan="4" class="text-center p-4">Loading jobs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <hr class="my-5" style="border-top: 2px dashed #eee;">

        <section class="form-section glass-card p-4">
            <h3 class="h5 mb-4">Add New Candidate Details</h3>
            <form id="candidateForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Candidate Name</label>
                    <input type="text" id="candidateName" class="form-control" placeholder="Full Name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" id="candidatePhone" class="form-control" placeholder="+91..." required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Upload Resume</label>
                    <input type="file" id="resume" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Current Status</label>
                    <select id="status" class="form-select">
                        <option>Screening</option>
                        <option>Interview Scheduled</option>
                        <option>Documents Collected</option>
                    </select>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn w-100 fw-bold" style="background:#f39c12; color:white; padding:12px;">Submit to TL for Review</button>
                </div>
            </form>
        </section>
    </div>

    <footer class="footer mt-5">
        <p>MSME Registered Agency | Secure Candidate Processing</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
